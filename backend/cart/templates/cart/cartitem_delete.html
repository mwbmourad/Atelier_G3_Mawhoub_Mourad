{% extends 'base/base.html' %}
{% block title %}Supprimer{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Confirmer la suppression</h2>
            <p class="card-text">Es-tu sûr de vouloir supprimer <strong>{{cartitem.product.name}}</strong> du panier ?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Supprimer</button>
                <a href="{% url 'cart_detail' %}" class="btn btn-dark">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
